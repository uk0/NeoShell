name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            arch: aarch64
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-${{ matrix.arch }}-cargo-

      - name: Install dependencies
        run: brew install libssh2 openssl@3

      - name: Build release
        run: |
          if [ -d "/opt/homebrew/opt/openssl@3" ]; then
            export OPENSSL_DIR="/opt/homebrew/opt/openssl@3"
          elif [ -d "/usr/local/opt/openssl@3" ]; then
            export OPENSSL_DIR="/usr/local/opt/openssl@3"
          fi
          cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package DMG
        run: |
          ARCH=${{ matrix.arch }}
          VERSION=${GITHUB_REF_NAME#v}
          APP="dist/NeoShell.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          # Find workspace binaries (path varies by target)
          BIN=$(find target -name "neoshell" -path "*/release/*" -not -name "*.d" -not -name "*.dylib" | head -1)
          LIB=$(find target -name "libneoshell_core.dylib" -path "*/release/*" | head -1)
          echo "Found launcher: $BIN" && echo "Found core: $LIB"
          [ -z "$BIN" ] && echo "ERROR: launcher not found" && exit 1
          [ -z "$LIB" ] && echo "ERROR: core lib not found" && exit 1
          cp "$BIN" "$APP/Contents/MacOS/"
          cp "$LIB" "$APP/Contents/MacOS/"
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>NeoShell</string>
            <key>CFBundleIdentifier</key><string>com.neoshell.app</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>neoshell</string>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          if [ -f assets/icon.png ]; then
            mkdir -p /tmp/icon.iconset
            for sz in 16 32 128 256 512; do
              sips -z $sz $sz assets/icon.png --out /tmp/icon.iconset/icon_${sz}x${sz}.png 2>/dev/null || true
            done
            cp /tmp/icon.iconset/icon_32x32.png /tmp/icon.iconset/icon_16x16@2x.png 2>/dev/null || true
            cp /tmp/icon.iconset/icon_256x256.png /tmp/icon.iconset/icon_128x128@2x.png 2>/dev/null || true
            cp /tmp/icon.iconset/icon_512x512.png /tmp/icon.iconset/icon_256x256@2x.png 2>/dev/null || true
            cp /tmp/icon.iconset/icon_512x512.png /tmp/icon.iconset/icon_512x512@2x.png 2>/dev/null || true
            iconutil -c icns /tmp/icon.iconset -o "$APP/Contents/Resources/icon.icns" 2>/dev/null || true
          fi
          # Code sign the app bundle
          if [ -n "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" ]; then
            # Import certificate from secrets
            echo "${{ secrets.MACOS_CERTIFICATE_BASE64 }}" | base64 --decode > /tmp/cert.p12
            KEYCHAIN_PATH=/tmp/build.keychain
            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            security import /tmp/cert.p12 -P "${{ secrets.MACOS_CERTIFICATE_PASSWORD }}" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
            SIGN_IDENTITY="${{ secrets.MACOS_SIGN_IDENTITY }}"
          else
            SIGN_IDENTITY="-"  # Ad-hoc signing (no certificate)
          fi

          # Sign all binaries (non-fatal — ad-hoc may fail verify on some runners)
          codesign --force --options runtime \
            --entitlements scripts/entitlements.plist \
            --sign "$SIGN_IDENTITY" \
            "$APP/Contents/MacOS/neoshell" 2>&1 || true
          codesign --force --options runtime \
            --entitlements scripts/entitlements.plist \
            --sign "$SIGN_IDENTITY" \
            "$APP/Contents/MacOS/libneoshell_core.dylib" 2>&1 || true
          codesign --force --deep --options runtime \
            --entitlements scripts/entitlements.plist \
            --sign "$SIGN_IDENTITY" \
            "$APP" 2>&1 || true
          echo "Signing attempted with: $SIGN_IDENTITY"

          # Create DMG with custom background
          DMG_DIR="dist/dmg"
          mkdir -p "$DMG_DIR/.background"
          cp scripts/dmg-background.png "$DMG_DIR/.background/background.png"
          cp -r dist/NeoShell.app "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname NeoShell -srcfolder "$DMG_DIR" -ov -format UDZO "dist/NeoShell-${VERSION}-macos-${ARCH}.dmg"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

      - name: Prepare core library artifact
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCH=${{ matrix.arch }}
          DYLIB=$(find target -name "libneoshell_core.dylib" -path "*/release/*" | head -1)
          [ -z "$DYLIB" ] && echo "ERROR: dylib not found" && exit 1
          cp "$DYLIB" "dist/libneoshell_core-${VERSION}-macos-${ARCH}.dylib"

      - name: Upload core library
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/libneoshell_core-*-macos-*.dylib

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-22.04-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-22.04-cargo-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssh2-1-dev libssl-dev pkg-config \
            libxkbcommon-dev libwayland-dev libvulkan-dev libfuse2

      - name: Build release
        run: cargo build --release --workspace

      - name: Verify GLIBC requirement
        run: |
          echo "=== GLIBC versions required ==="
          objdump -T target/release/neoshell | grep GLIBC | sed 's/.*GLIBC_/GLIBC_/' | sort -uV
          objdump -T target/release/libneoshell_core.so | grep GLIBC | sed 's/.*GLIBC_/GLIBC_/' | sort -uV
          echo "Target: GLIBC <= 2.35 (Ubuntu 22.04)"

      - name: Package AppImage
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          APP="dist/NeoShell.AppDir"
          mkdir -p "$APP/usr/bin" "$APP/usr/lib" \
            "$APP/usr/share/applications" \
            "$APP/usr/share/icons/hicolor/256x256/apps"
          cp target/release/neoshell "$APP/usr/bin/"
          cp target/release/libneoshell_core.so "$APP/usr/lib/"
          cp assets/icon.png "$APP/neoshell.png"
          cp assets/icon.png "$APP/usr/share/icons/hicolor/256x256/apps/neoshell.png"
          cat > "$APP/neoshell.desktop" <<'DESKTOP'
          [Desktop Entry]
          Name=NeoShell
          Comment=Cross-Platform SSH Manager
          Exec=neoshell
          Icon=neoshell
          Terminal=false
          Type=Application
          Categories=System;Network;
          DESKTOP
          cp "$APP/neoshell.desktop" "$APP/usr/share/applications/"
          cat > "$APP/AppRun" <<'APPRUN'
          #!/bin/bash
          HERE=$(dirname "$(readlink -f "$0")")
          export LD_LIBRARY_PATH="$HERE/usr/lib:${LD_LIBRARY_PATH}"
          exec "$HERE/usr/bin/neoshell" "$@"
          APPRUN
          chmod +x "$APP/AppRun"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APP" "dist/NeoShell-${VERSION}-linux-x86_64.AppImage"

      - name: Fallback tar.gz
        if: failure()
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist && tar -czf "dist/NeoShell-${VERSION}-linux-x86_64.tar.gz" -C target/release neoshell libneoshell_core.so

      - name: Upload to Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.tar.gz

      - name: Prepare core library artifact
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SO=$(find target -name "libneoshell_core.so" -path "*/release/*" | head -1)
          [ -z "$SO" ] && echo "ERROR: .so not found" && exit 1
          cp "$SO" "dist/libneoshell_core-${VERSION}-linux-x86_64.so"

      - name: Upload core library
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/libneoshell_core-*-linux-*.so

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install NASM (for openssl vendored build)
        uses: ilammy/setup-nasm@v1

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release
        env:
          OPENSSL_STATIC: "1"
        run: cargo build --release --workspace

      - name: Package zip
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          New-Item -ItemType Directory -Force -Path dist,dist\NeoShell
          Copy-Item target\release\neoshell.exe dist\NeoShell\
          Copy-Item target\release\neoshell_core.dll dist\NeoShell\
          Copy-Item assets\icon.png dist\NeoShell\
          Compress-Archive -Path dist\NeoShell\* -DestinationPath "dist\NeoShell-$VERSION-windows-x64.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

      - name: Prepare core library artifact
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          $DLL = Get-ChildItem -Path target -Recurse -Filter "neoshell_core.dll" | Where-Object { $_.DirectoryName -like "*release*" } | Select-Object -First 1
          if (-not $DLL) { Write-Error "ERROR: neoshell_core.dll not found"; exit 1 }
          Copy-Item $DLL.FullName "dist\neoshell_core-$VERSION-windows-x64.dll"

      - name: Upload core library
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/neoshell_core-*-windows-*.dll

  build-windows-win7:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install NASM (for openssl vendored build)
        uses: ilammy/setup-nasm@v1

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-win7-nightly-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-win7-nightly-

      - name: Build release (Win7 target with rebuilt std)
        env:
          OPENSSL_STATIC: "1"
        run: >
          cargo +nightly build --release --workspace
          --target x86_64-win7-windows-msvc
          -Z build-std=std,panic_abort

      - name: Package zip
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          $TARGET_DIR = "target\x86_64-win7-windows-msvc\release"
          New-Item -ItemType Directory -Force -Path dist,"dist\NeoShell-Win7"
          Copy-Item "$TARGET_DIR\neoshell.exe" "dist\NeoShell-Win7\"
          Copy-Item "$TARGET_DIR\neoshell_core.dll" "dist\NeoShell-Win7\"
          Copy-Item assets\icon.png "dist\NeoShell-Win7\"
          Set-Content "dist\NeoShell-Win7\README-Win7.txt" "NeoShell for Windows 7 / Server 2008 R2`nRequires: OpenGL 3.3+ or Vulkan GPU driver`nIf display issues: set WGPU_BACKEND=gl"
          Compress-Archive -Path "dist\NeoShell-Win7\*" -DestinationPath "dist\NeoShell-$VERSION-windows-win7-x64.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-win7-*.zip

      - name: Prepare core library artifact
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          $TARGET_DIR = "target\x86_64-win7-windows-msvc\release"
          $DLL = Get-ChildItem -Path $TARGET_DIR -Filter "neoshell_core.dll" | Select-Object -First 1
          if (-not $DLL) { Write-Error "ERROR: neoshell_core.dll not found"; exit 1 }
          Copy-Item $DLL.FullName "dist\neoshell_core-$VERSION-windows-win7-x64.dll"

      - name: Upload core library
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/neoshell_core-*-windows-win7-*.dll
